name: Deploy EC2 via Terraform Cloud

on:
  workflow_dispatch:
    inputs:
      instance_type:
        description: "EC2 instance type"
        required: true
        default: "t2.micro"
      instance_name:
        description: "EC2 name"
        required: true
        default: "Port-EC2"
  push:
    branches:
      - main   # ✅ ADD THIS BACK

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set Terraform Token
        run: echo "TF_TOKEN_app_terraform_io=${{ secrets.TF_API_TOKEN }}" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
          -var="instance_type=${{ github.event.inputs.instance_type }}" \
          -var="instance_name=${{ github.event.inputs.instance_name }}" 

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
          -var="instance_type=${{ github.event.inputs.instance_type }}" \
          -var="instance_name=${{ github.event.inputs.instance_name }}"

      - name: Send EC2 to Port        
        env:
          PORT_API_KEY: ${{ secrets.PORT_API_KEY }}
        run: |
          curl -X POST https://api.getport.io/v1/blueprints/ec2_instance/entities \
          -H "Authorization: Bearer $PORT_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "identifier": "${{ github.run_id }}",
            "title": "${{ github.event.inputs.instance_name }}",
            "properties": {
              "instance_name": "${{ github.event.inputs.instance_name }}",
              "instance_type": "${{ github.event.inputs.instance_type }}",
              "status": "running"
            }
          }'
          
      - name: Report success to Port
        if: success()
        env:
          PORT_API_KEY: ${{ secrets.PORT_API_KEY }}
        run: |
          curl -X POST https://api.getport.io/v1/actions/runs/${{ github.run_id }}/complete \
          -H "Authorization: Bearer $PORT_API_KEY" \
          -H "Content-Type: application/json"

      - name: Report failure to Port
        if: failure()
        env:
          PORT_API_KEY: ${{ secrets.PORT_API_KEY }}
        run: |
          curl -X POST https://api.getport.io/v1/actions/runs/${{ github.run_id }}/fail \
          -H "Authorization: Bearer $PORT_API_KEY" \
          -H "Content-Type: application/json"

