name: Deploy EC2 via Terraform Cloud

on:
  workflow_dispatch:
    inputs:
      instance_type:
        required: true
        default: "t2.micro"
      instance_name:
        required: true
        default: "Port-EC2"
      port_run_id:
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Log start
      - name: Log start
        env:
          PORT_API_KEY: ${{ secrets.PORT_API_KEY }}
        run: |
          curl -X POST https://api.getport.io/v1/actions/runs/${{ github.event.inputs.port_run_id }}/logs \
          -H "Authorization: Bearer $PORT_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"message": "Starting EC2 creation..."}'

      # ✅ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set Terraform Token
        run: echo "TF_TOKEN_app_terraform_io=${{ secrets.TF_API_TOKEN }}" >> $GITHUB_ENV

      # ✅ Log before creation
      - name: Log before creation
        env:
          PORT_API_KEY: ${{ secrets.PORT_API_KEY }}
        run: |
          curl -X POST https://api.getport.io/v1/actions/runs/${{ github.event.inputs.port_run_id }}/logs \
          -H "Authorization: Bearer $PORT_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"message": "Creating EC2 instance via Terraform..."}'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
          -var="instance_type=${{ github.event.inputs.instance_type }}" \
          -var="instance_name=${{ github.event.inputs.instance_name }}"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
          -var="instance_type=${{ github.event.inputs.instance_type }}" \
          -var="instance_name=${{ github.event.inputs.instance_name }}"

      # ✅ Log success
      - name: Log success step
        if: success()
        env:
          PORT_API_KEY: ${{ secrets.PORT_API_KEY }}
        run: |
          curl -X POST https://api.getport.io/v1/actions/runs/${{ github.event.inputs.port_run_id }}/logs \
          -H "Authorization: Bearer $PORT_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"message": "EC2 instance created successfully ✅"}'

      # ✅ Send to catalog
      - name: Send EC2 to Port
        if: success()
        env:
          PORT_API_KEY: ${{ secrets.PORT_API_KEY }}
        run: |
          curl -X POST https://api.getport.io/v1/blueprints/ec2_instance/entities \
          -H "Authorization: Bearer $PORT_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "identifier": "${{ github.run_id }}",
            "title": "${{ github.event.inputs.instance_name }}",
            "properties": {
              "instance_name": "${{ github.event.inputs.instance_name }}",
              "instance_type": "${{ github.event.inputs.instance_type }}",
              "status": "running"
            }
          }'

      # ✅ Mark success
      - name: Mark success
        if: success()
        env:
          PORT_API_KEY: ${{ secrets.PORT_API_KEY }}
        run: |
          curl -X POST https://api.getport.io/v1/actions/runs/${{ github.event.inputs.port_run_id }} \
          -H "Authorization: Bearer $PORT_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"status": "success"}'

      # ✅ Mark failure
      - name: Mark failure
        if: failure()
        env:
          PORT_API_KEY: ${{ secrets.PORT_API_KEY }}
        run: |          
          curl -X POST https://api.getport.io/v1/actions/runs/${{ github.event.inputs.port_run_id }} \
          -H "Authorization: Bearer $PORT_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"status": "failure"}'
